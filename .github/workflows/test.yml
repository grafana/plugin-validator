name: Build and Test on pull request

on:
  pull_request:
    branches:
      - main
      - renovate/*

jobs:
  test-mcp-server:
    runs-on: ubuntu-x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Run MCP server tests
        run: go test -v ./pkg/cmd/mcpserver/...

  test-docker-build:
    runs-on: ubuntu-x64
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - id: push-to-dockerhub
        uses: grafana/shared-workflows/actions/build-push-to-dockerhub@f02d5da7ddff4ea32bbe5034c7c70e90d2b9622c # build-push-to-dockerhub/v0.4.1
        with:
          repository: grafana/plugin-validator-cli
          context: .
          tags: |-
            "test-pr"
          push: false
          # Disable the build cache (the action defaults cache-from/to to
          # type=gha): this PR validation build must not seed a shared cache a
          # publishing build could later consume (cache poisoning), and the
          # type=gha backend was failing to import anyway.
          cache-from: ""
          cache-to: ""
