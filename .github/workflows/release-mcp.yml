name: Create MCP release and publish to github and npm

# Reusable workflow invoked by release-please.yml once an MCP release has been
# drafted. See release.yml for why this is driven from release-please's outputs
# rather than a tag push (GitHub immutable releases + draft releases).
on: # zizmor: ignore[cache-poisoning]
  workflow_call:
    inputs:
      tag_name:
        description: Release tag, e.g. mcp/v0.1.3
        required: true
        type: string
      sha:
        description: Commit SHA the release points at
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, e.g. mcp/v0.1.3
        required: true
        type: string
      sha:
        description: Commit SHA the release points at
        required: true
        type: string

jobs:
  release-mcp-to-github:
    runs-on: ubuntu-arm64
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: true
          # This is a publishing workflow; disable the Go cache so a cache
          # entry poisoned from a less-trusted context can't influence the
          # released binaries (zizmor cache-poisoning).
          cache: false

      - name: Generate token
        id: generate_token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - name: Extract MCP version
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: echo "MCP_VERSION=${TAG_NAME#mcp/v}" >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: latest
          # release-please tags look like `mcp/v0.1.2`, which GoReleaser's
          # validate pipe can't parse as semver. Skip it; the archive name
          # template uses `MCP_VERSION` directly and `release.mode:
          # keep-existing` preserves release-please's notes.
          args: release --clean --config .goreleaser.mcp.yaml --skip=validate
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag_name }}
          MCP_VERSION: ${{ env.MCP_VERSION }}

  release-mcp-to-npm:
    runs-on: ubuntu-latest
    needs: release-mcp-to-github
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.sha }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      # Staged publishing requires npm >= 11.15.0, newer than the npm bundled
      # with Node 24.
      - run: npm install -g npm@latest
      - run: cd mcp-package && npm install
      - run: cd mcp-package && npm stage publish

      - name: Notify Slack about staged npm package
        uses: grafana/shared-workflows/actions/send-slack-message@952ec381447a2002ff76103395d37bf8b4c7c3f5 # send-slack-message/v3.0.1
        with:
          method: chat.postMessage
          payload: |
            {
              "channel": "C031SLFH6G0",
              "text": "📦 `@grafana/plugin-validator-mcp` has been staged for npm publishing from tag `${{ inputs.tag_name }}`. Please review and approve at https://www.npmjs.com/settings/grafanabot/staged-packages"
            }
