name: Create MCP release and publish to github and npm

on: # zizmor: ignore[cache-poisoning]
  push:
    tags:
      - "mcp/v[0-9]*"

jobs:
  release-mcp-to-github:
    runs-on: ubuntu-arm64
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Generate token
        id: generate_token
        uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
        with:
          github_app: grafana-plugins-platform-bot

      - name: Extract MCP version
        run: echo "MCP_VERSION=${GITHUB_REF_NAME#mcp/v}" >> $GITHUB_ENV

      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: latest
          # release-please tags look like `mcp/v0.1.2`, which GoReleaser's
          # validate pipe can't parse as semver. Skip it; the archive name
          # template uses `MCP_VERSION` directly and `release.mode:
          # keep-existing` preserves release-please's notes.
          args: release --clean --config .goreleaser.mcp.yaml --skip=validate
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          MCP_VERSION: ${{ env.MCP_VERSION }}

  release-mcp-to-npm:
    runs-on: ubuntu-latest
    needs: release-mcp-to-github
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - run: cd mcp-package && npm install
      - run: cd mcp-package && npm publish
